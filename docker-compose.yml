version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: siarf_db
    environment:
      POSTGRES_DB: siarf_db
      POSTGRES_USER: siarf_user
      POSTGRES_PASSWORD: siarf_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: